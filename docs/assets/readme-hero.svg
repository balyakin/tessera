<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Tessera publishing flow">
  <rect width="1200" height="420" fill="#f7f4ef"/>
  <rect x="60" y="70" width="1080" height="280" rx="8" fill="#ffffff" stroke="#232323" stroke-width="2"/>
  <text x="100" y="150" font-family="serif" font-size="68" fill="#111">Tessera</text>
  <text x="104" y="196" font-family="sans-serif" font-size="26" fill="#333">Semantic book publishing from DOCX/ODT to PDF and EPUB</text>
  <g font-family="monospace" font-size="30" fill="#111">
    <text x="120" y="285">DOCX/ODT</text>
    <text x="365" y="285">-&gt;</text>
    <text x="460" y="285">Semantic IR</text>
    <text x="710" y="285">-&gt;</text>
    <text x="805" y="285">PDF + EPUB</text>
  </g>
  <rect x="112" y="310" width="120" height="8" fill="#2f7d64"/>
  <rect x="464" y="310" width="166" height="8" fill="#9a4f2f"/>
  <rect x="810" y="310" width="160" height="8" fill="#315f9b"/>
