name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - run: go mod verify
      - run: go test -coverprofile=coverage.out ./...
      - run: go vet ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - run: go run ./internal/demo/generate
      - run: go run ./cmd/tessera build examples/semantic-demo.docx --to epub --output dist --lint --reproducible
      - uses: actions/upload-artifact@v4
        with:
          name: tessera-demo
          path: dist
